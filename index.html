<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مشاريع نافعة على تليجرام</title>
  <meta name="description" content="مجموعة من القنوات والبوتات المجانية على تليجرام: قرآن، أذكار، تربية، صلة رحم، تعلّم الإنجليزية، ورياضيات للأطفال." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f7f4;
      --card: #ffffff;
      --ink: #1f2421;
      --muted: #5d6b63;
      --accent: #1f7a5c;
      --accent-soft: #e7f2ec;
      --border: #e6e9e4;
      --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(20,40,30,.06);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Tajawal", "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    html[lang="en"] body { font-family: "Inter", "Tajawal", system-ui, sans-serif; }
    .wrap { max-width: 940px; margin: 0 auto; padding: 28px 20px 64px; }

    .topbar { display: flex; justify-content: flex-end; padding-top: 8px; }
    .lang-btn {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform .12s ease, background .12s ease;
    }
    .lang-btn:hover { background: var(--accent-soft); transform: translateY(-1px); }

    header.hero { text-align: center; padding: 18px 0 8px; }
    .hero h1 { font-size: clamp(1.7rem, 4vw, 2.5rem); margin: 0 0 8px; font-weight: 700; }
    .hero .tagline { color: var(--accent); font-weight: 600; margin: 0 0 18px; }
    .hero .intro { color: var(--muted); max-width: 640px; margin: 0 auto; }

    .badges { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 22px 0 6px; }
    .badge {
      background: var(--accent-soft); color: var(--accent);
      border-radius: 999px; padding: 6px 14px; font-size: .9rem; font-weight: 500;
    }

    .grid {
      display: grid; gap: 18px; margin-top: 34px;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 22px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 10px;
      transition: transform .14s ease, box-shadow .14s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 2px 4px rgba(0,0,0,.05), 0 14px 32px rgba(20,40,30,.10); }
    .card .icon { font-size: 1.9rem; line-height: 1; }
    .card h2 { margin: 2px 0 0; font-size: 1.25rem; font-weight: 700; }
    .card p { margin: 0; color: var(--muted); flex: 1; }
    .links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .links a {
      text-decoration: none; font-weight: 600; font-size: .92rem;
      color: var(--accent); background: var(--accent-soft);
      border-radius: 10px; padding: 8px 14px;
      transition: background .12s ease, color .12s ease;
    }
    .links a:hover { background: var(--accent); color: #fff; }

    footer { text-align: center; color: var(--muted); margin-top: 44px; padding-top: 22px; border-top: 1px solid var(--border); }
    footer .dua { max-width: 600px; margin: 0 auto; }

    .noscript { text-align: center; background: var(--accent-soft); color: var(--accent); padding: 14px; border-radius: 12px; margin-top: 24px; }

    @media (max-width: 520px) {
      .wrap { padding: 18px 14px 48px; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button id="langBtn" class="lang-btn" type="button" aria-label="Switch language">EN</button>
    </div>

    <header class="hero">
      <h1 data-i18n="title">مشاريع نافعة على تليجرام</h1>
      <p class="tagline" data-i18n="tagline">مجانية، ونظيفة، وصدقة جارية بإذن الله</p>
      <p class="intro" data-i18n="intro"></p>
      <div class="badges" id="badges"></div>
    </header>

    <main class="grid" id="grid"></main>

    <noscript>
      <div class="noscript">
        لتصفّح الموقع كاملًا فعّل الجافاسكربت. والروابط متاحة مباشرةً على تليجرام:
        @AyahHifzBot، @tilawah_daily، @zaaduna، @bayt_aamin، @WisaaliBot، @fluent_owls، @NumNinjas
      </div>
    </noscript>

    <footer>
      <p class="dua" data-i18n="footer"></p>
    </footer>
  </div>

  <script>
    const I18N = {
      ar: {
        dir: "rtl",
        htmlTitle: "مشاريع نافعة على تليجرام",
        title: "مشاريع نافعة على تليجرام",
        tagline: "مجانية، ونظيفة، وصدقة جارية بإذن الله",
        intro: "هذه مجموعة من القنوات والبوتات على تطبيق تليجرام، جميعها مجانية وبلا إعلانات، ومحتواها نظيف ومناسب لكل أفراد الأسرة. أنشأتُها لتكون صدقة جارية، وأسأل الله أن ينفعك بها وينفع بها من تدلّه عليها.",
        badges: ["مجانية بلا إعلانات", "محتوى نظيف للأسرة", "رسائل صامتة لا تُزعج"],
        toggle: "EN",
        footer: "إن وجدتَ فيها ما ينفعك فدُلّ عليه غيرك، فالدالّ على الخير كفاعله. ولا تنسَني من دعوة بظهر الغيب. 🤍",
        labels: { channel: "القناة", bot: "البوت" }
      },
      en: {
        dir: "ltr",
        htmlTitle: "Beneficial Telegram Projects",
        title: "Beneficial Telegram Projects",
        tagline: "Free, clean, and an ongoing charity",
        intro: "This is a small family of free Telegram channels and bots. They are all free, with no ads, and the content is clean and suitable for the whole family. I made them as an ongoing charity, and I hope they benefit you and anyone you share them with.",
        badges: ["Free, no ads", "Clean and family friendly", "Silent messages"],
        toggle: "ع",
        footer: "If you find something useful here, please share it with others. And please remember me in your du'a. 🤍",
        labels: { channel: "Channel", bot: "Bot" }
      }
    };

    const PROJECTS = [
      {
        icon: "📖",
        name: { ar: "آية", en: "Ayah" },
        desc: {
          ar: "احفظ ما تيسّر من القرآن الكريم آيةً آيةً كل يوم، مع التفسير الميسّر وتلاوة لتتعلّم القراءة الصحيحة.",
          en: "Memorize the Qur'an one ayah a day, with a simple tafsir and a recitation to learn how to read it."
        },
        links: [{ type: "bot", url: "https://t.me/AyahHifzBot" }]
      },
      {
        icon: "📗",
        name: { ar: "تِلاوة", en: "Tilawah" },
        desc: {
          ar: "وِرد يومي من القرآن الكريم، مع درس تجويد قصير وتلاوة صوتية للصفحة.",
          en: "A daily Qur'an reading portion, with a short tajweed lesson and an audio recitation for the page."
        },
        links: [
          { type: "channel", url: "https://t.me/tilawah_daily" },
          { type: "bot", url: "https://t.me/TilawahDailyBot" }
        ]
      },
      {
        icon: "🌿",
        name: { ar: "زادُنا", en: "Zaaduna" },
        desc: {
          ar: "أذكار الصباح والمساء، وأخلاق وسنن نبوية، ومراجعة يومية هادئة للنفس في آخر اليوم.",
          en: "Morning and evening adhkar, prophetic manners and sunan, and a calm daily self review at the end of the day."
        },
        links: [{ type: "channel", url: "https://t.me/zaaduna" }]
      },
      {
        icon: "🏡",
        name: { ar: "آمِن", en: "Aamin" },
        desc: {
          ar: "تذكيرات لطيفة للآباء والأمهات؛ أن نربّي أبناءنا بالحب والرفق ونمنحهم الشعور بالأمان.",
          en: "Gentle reminders for parents, to raise our children with love and kindness and give them a sense of safety."
        },
        links: [{ type: "channel", url: "https://t.me/bayt_aamin" }]
      },
      {
        icon: "🤝",
        name: { ar: "وِصال", en: "Wisaal" },
        desc: {
          ar: "تذكير بسيط بصلة الرحم، يذكّرك بأقاربك واحدًا تلو الآخر لتطمئنّ عليهم.",
          en: "A simple reminder to keep family ties, nudging you about your relatives one at a time."
        },
        links: [{ type: "bot", url: "https://t.me/WisaaliBot" }]
      },
      {
        icon: "🦉",
        name: { ar: "Fluent Owls", en: "Fluent Owls" },
        desc: {
          ar: "محتوى يومي لتعلّم الإنجليزية بجميع المستويات، من الأسئلة إلى النطق والمحادثة.",
          en: "Daily English content for every level, from quizzes to pronunciation and conversation."
        },
        links: [
          { type: "channel", url: "https://t.me/fluent_owls" },
          { type: "bot", url: "https://t.me/FluentOwlsBot" }
        ]
      },
      {
        icon: "🥷",
        name: { ar: "Num Ninjas", en: "Num Ninjas" },
        desc: {
          ar: "سؤالان في الرياضيات كل يوم للأطفال من سن العاشرة إلى الثانية عشرة.",
          en: "Two math questions every day for children aged 10 to 12."
        },
        links: [{ type: "channel", url: "https://t.me/NumNinjas" }]
      }
    ];

    function render(lang) {
      const t = I18N[lang];
      const html = document.documentElement;
      html.lang = lang;
      html.dir = t.dir;
      document.title = t.htmlTitle;

      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        const key = el.getAttribute("data-i18n");
        if (t[key]) el.textContent = t[key];
      });

      const badges = document.getElementById("badges");
      badges.innerHTML = "";
      t.badges.forEach(function (b) {
        const span = document.createElement("span");
        span.className = "badge";
        span.textContent = b;
        badges.appendChild(span);
      });

      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      PROJECTS.forEach(function (p) {
        const card = document.createElement("article");
        card.className = "card";

        const icon = document.createElement("div");
        icon.className = "icon";
        icon.textContent = p.icon;

        const h2 = document.createElement("h2");
        h2.textContent = p.name[lang];

        const desc = document.createElement("p");
        desc.textContent = p.desc[lang];

        const links = document.createElement("div");
        links.className = "links";
        p.links.forEach(function (l) {
          const a = document.createElement("a");
          a.href = l.url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = t.labels[l.type];
          links.appendChild(a);
        });

        card.appendChild(icon);
        card.appendChild(h2);
        card.appendChild(desc);
        card.appendChild(links);
        grid.appendChild(card);
      });

      document.getElementById("langBtn").textContent = t.toggle;
    }

    // Arabic is the default for first-time visitors. A returning visitor keeps
    // whatever language they last chose (saved in localStorage).
    const saved = localStorage.getItem("lang");
    let current = saved === "en" ? "en" : "ar";
    render(current);

    document.getElementById("langBtn").addEventListener("click", function () {
      current = current === "ar" ? "en" : "ar";
      localStorage.setItem("lang", current);
      render(current);
    });
  </script>
</body>
</html>
